# Run test classes in parallel within a single JVM. Each test class registers its own
# disjoint set of Step Functions state-machine and activity ARNs (every class declares
# its own inner Workflow class), so inter-class polling never collides.
#
# Methods inside a single class still run serially: a class's Flux capacitor is shared
# across its @Test methods and we don't want concurrent executions on the same workflow.
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
junit.jupiter.execution.parallel.config.strategy=fixed
junit.jupiter.execution.parallel.config.fixed.parallelism=4
